apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresher
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-editor
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresher-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: ecr-refresher
    namespace: default
roleRef:
  kind: Role
  name: ecr-secret-editor
  apiGroup: rbac.authorization.k8s.io
