apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ci-dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/IPpetrov/ci-dashboard-chart.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
