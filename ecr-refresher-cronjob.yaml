apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-pull-secret-refresh
  namespace: default
spec:
  schedule: "0 */6 * * *"   # every 6 hours — well inside the ~12h token life
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-refresher
          restartPolicy: OnFailure
          containers:
            - name: refresh
              image: amazon/aws-cli:2.17.62
              command: ["/bin/sh", "-c"]
              args:
                - |
                  curl -sLO "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
                  chmod +x kubectl
                  TOKEN=$(aws ecr get-login-password --region eu-central-1)
                  ./kubectl create secret docker-registry ecr-pull-secret \
                    --docker-server=992382571377.dkr.ecr.eu-central-1.amazonaws.com \
                    --docker-username=AWS \
                    --docker-password="$TOKEN" \
                    --namespace=default \
                    --dry-run=client -o yaml | ./kubectl apply -f -
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef: { name: aws-ecr-refresher-creds, key: AWS_ACCESS_KEY_ID }
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef: { name: aws-ecr-refresher-creds, key: AWS_SECRET_ACCESS_KEY }
