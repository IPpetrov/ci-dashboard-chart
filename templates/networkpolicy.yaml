apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ci-dashboard-chart.fullname" . }}
  labels:
    {{- include "ci-dashboard-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ci-dashboard-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
